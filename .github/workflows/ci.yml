name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modern/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: modern/frontend/package-lock.json
      - run: npm ci
      - run: npm test -- --run

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modern/backend
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql
      - run: composer install --no-interaction
      - run: php vendor/bin/phpunit

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy Frontend
        run: curl -s -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK_FRONTEND }}"
      - name: Deploy Backend
        run: curl -s -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK_BACKEND }}"
